<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Магазин{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffceec;
        }
        header {
            background-color: #d46da6;
            color: white;
            padding: 10px 20px;
            text-align: center;
        }
        header h1 {
            margin: 0;
        }
        nav {
            background-color: #e679c5;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(223, 109, 185, 0.1);
        }
        footer {
            background-color: #ff9dfa;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        .product {
            border: 1px solid #ddd;
            padding: 10px;
            margin: 10px;
            display: inline-block;
            width: 250px;
            vertical-align: top;
            background-color: #fff;
            border-radius: 5px;
        }
        .product img {
            max-width: 100%;
            height: 150px;
            object-fit: cover;
            margin: 5px 0;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
        }
        .gallery img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            margin: 2px;
            border: 1px solid #ccc;
        }
        .badge {
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }
        .in-stock {
            background-color: pink;
            color: white;
        }
        .out-of-stock {
            background-color: red;
            color: white;
        }
        .price {
            font-size: 24px;
            color: #333;
        }
        .old-price {
            text-decoration: line-through;
            color: #999;
            font-size: 18px;
        }
        .pagination {
            text-align: center;
            margin: 20px 0;
        }
        .pagination a {
            margin: 0 5px;
            padding: 5px 10px;
            border: 1px solid #ddd;
            text-decoration: none;
            color: #333;
        }
        .pagination a:hover {
            background-color: #c24f4f;
        }
        .pagination .current {
            background-color: #b86ea1;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="{% url 'catalog:home' %}" style="color: white; text-decoration: none;">Интернет-магазин</a></h1>
        <nav>
            <a href="{% url 'catalog:home' %}">Главная</a>
            <a href="{% url 'catalog:category_list' %}">Категории</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>&copy; 2023 Интернет-магазин. Все права защищены.</p>
    </footer>
</body>
</html>

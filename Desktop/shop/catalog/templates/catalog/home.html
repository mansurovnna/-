{% extends "base.html" %}

{% block title %}Главная - Магазин{% endblock %}

{% block content %}
<h2>Добро пожаловать в наш магазин!</h2>
<p>Выберите категорию товаров:бебе</p>
<ul>
    {% for category in categories %}
        <li><a href="{% url 'catalog:product_list_by_category' category.slug %}">{{ category.name }}</a></li>
    {% endfor %}
</ul>
{% endblock %}

<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Магазин{% endblock %}</title>
</head>
<body>
  <header>
    <a href="{% url 'catalog:home' %}">Главная</a> |
    <a href="{% url 'catalog:category_list' %}">Каталог</a> |
    <a href="{% url 'catalog:cart_detail' %}">Корзина</a>
    {% if user.is_authenticated %}
      | Привет, {{ user.username }} |
      <a href="{% url 'catalog:my_orders' %}">Мои заказы</a> |
      <a href="{% url 'logout' %}">Выйти</a>
    {% else %}
      | <a href="{% url 'login' %}">Войти</a> |
      <a href="{% url 'register' %}">Регистрация</a>
    {% endif %}
    <hr>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <hr>
    <small>ENU College • Django Shop</small>
  </footer>
</body>
</html>

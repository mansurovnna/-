<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Регистрация</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; margin: 0; }
        .container { max-width: 420px; margin: 48px auto; }
        .card { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 6px 18px rgba(0,0,0,0.06); }
        h1 { margin: 0 0 14px 0; font-size: 22px; color: #111; }
        label { display:block; font-size:14px; margin-top:12px; color:#333; }
        input[type="text"], input[type="number"], select { width:100%; padding:10px 12px; margin-top:6px; border:1px solid #d9d9d9; border-radius:6px; box-sizing:border-box; }
        .actions { margin-top:18px; }
        button { width:100%; padding:10px 14px; background:#2563eb; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:15px; }
        button:hover { background:#1e4fd8; }
        .hint { font-size:13px; color:#666; margin-top:8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Начало регистрации</h1>
            <form method="post" action="postuser/">
                {% csrf_token %}
                <label for="name">Имя</label>
                <input id="name" name="name" type="text" placeholder="Введите имя" required />

                <label for="age">Возраст</label>
                <input id="age" name="age" type="number" placeholder="Введите возраст" min="1" />

                <label for="languages">Выберите языки (Ctrl/Shift для множественного выбора)</label>
                <select id="languages" multiple name="languages">
                    <option>Python</option>
                    <option>JavaScript</option>
                    <option>C++</option>
                    <option>Java</option>
                </select>

                <div class="actions">
                    <button type="submit">Зарегистрироваться</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

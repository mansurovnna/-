<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Result</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 6px; background: #fafafa; }
        h1 { font-size: 20px; margin-bottom: 10px; }
        .field { margin-bottom: 10px; }
        .label { font-weight: bold; color: #333; }
        .value { margin-left: 8px; color: #222; }
        ul { margin: 6px 0 0 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Submitted data</h1>
        <div class="field"><span class="label">Name:</span><span class="value">{{ name }}</span></div>
        <div class="field"><span class="label">Age:</span><span class="value">{{ age }}</span></div>
        <div class="field"><span class="label">Languages:</span>
            {% if languages %}
                <ul>
                {% for lang in languages %}
                    <li>{{ lang }}</li>
                {% endfor %}
                </ul>
            {% else %}
                <span class="value">(no languages)</span>
            {% endif %}
        </div>
    </div>
</body>
</html>
